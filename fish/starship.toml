format = """
${custom.proxy}${custom.pyenv}${custom.dotenv}$all
"""

[custom.proxy]
when = "test ! -z $http_proxy"
symbol = "📡 "
format = "$symbol"

[custom.pyenv]
when = "which pip"
symbol = "🔗 "
style = "bold orange"
format = "[$symbol]($style)"

[custom.dotenv]
when = 'test -n "$DOTENV_ACTIVE"'
symbol = "🧩 "
style = "bold green"
format = "[$symbol]($style)"

[time]
disabled = false
time_format = '%Y-%m-%d %T'

[status]
disabled = false
symbol = '👺 '

[python]
pyenv_prefix = ''
pyenv_version_name = true

[jobs]
number_threshold = 1
